{% extends 'base.html' %}

{% block conteudo %}

<div class="container">

<div class="card p-4 shadow">

<h2>Criar Leilão</h2>

<form method="POST" enctype="multipart/form-data">

<input
name="titulo"
class="form-control mb-3"
placeholder="Título"
required>

<textarea
name="descricao"
class="form-control mb-3"
placeholder="Descrição"
required></textarea>

<input
type="number"
step="0.01"
name="preco"
class="form-control mb-3"
placeholder="Preço inicial"
required>

<input
type="date"
name="data"
class="form-control mb-3"
required>

<label>Imagem</label>

<input
type="file"
name="imagem"
class="form-control mb-3">

<button class="btn btn-primary">

Criar Leilão

</button>

</form>

</div>

</div>

{% endblock %}
